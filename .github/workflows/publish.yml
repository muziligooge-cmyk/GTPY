name: Build and Release

on:
  push:
    tags:
      - 'v*' # 当你推送 v1.0.0 这样的标签时触发

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Publish App
      run: dotnet publish -c Release -r win-x64 --self-contained true /p:PublishSingleFile=true /p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

    - name: Create Zip
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath ./BlueGlassMihomoClient-win-x64.zip

    - name: Release
      uses: softprops/action-gh-release@v1
      with:
        files: BlueGlassMihomoClient-win-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
